<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kỹ năng — Life Balance</title>
  <meta name="description" content="Water element — talent and skill building, coming soon." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%234caf50'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' font-family='Inter,sans-serif' font-weight='800' font-size='16' fill='white'>LB</text></svg>" />
  <link rel="stylesheet" href="css/style.css?v=20" />
</head>
<body>

  <div id="toast" role="status" aria-live="polite"></div>

  <header class="site-header">
    <div class="site-header__inner">
      <div class="logo">
        <div class="logo-mark">LB</div>
        <div class="logo-text">
          <strong>Life Balance</strong>
          <span>Five Elements Tracker</span>
        </div>
      </div>
      <span class="pi-status" id="pi-status">Checking Pi Browser…</span>
    </div>
  </header>

  <a class="journal-back" href="index.html"><span class="journal-back__arrow" aria-hidden="true">←</span> Home</a>

  <section class="journal-hero" style="--current-element: var(--water); --current-element-tint: var(--water-tint);">
    <div class="journal-hero__icon">💧</div>
    <h1 class="journal-hero__title">Water Element</h1>
    <p class="journal-hero__dimension">Talent — xây dựng kỹ năng</p>
  </section>

  <!-- ══════════════════════════════════════════════════
       SKILL TALENTS — huy hiệu kỹ năng dạng icon + mức độ
  ══════════════════════════════════════════════════ -->
  <section class="skill-section" id="skills">
    <form class="skill-add-form" id="skill-add-form">
      <input type="text" id="skill-new-name" placeholder="Tên kỹ năng (vd: Guitar, Lập trình…)" />
      <div class="skill-icon-picker" id="skill-icon-picker"></div>
      <div class="skill-level-picker">
        <span>Mức độ:</span>
        <div class="skill-level-picker__stars" id="skill-level-picker"></div>
      </div>
      <button type="submit" id="skill-add-btn" class="btn btn-primary">Thêm kỹ năng</button>
    </form>

    <div class="skill-grid" id="skill-grid"></div>
  </section>

  <!-- Skill "folder" — notes + uploaded images, opened by clicking a skill's icon -->
  <div id="skill-detail-modal" class="finance-modal" hidden>
    <div class="finance-modal__inner">
      <button type="button" id="skill-detail-close" class="finance-modal__close" aria-label="Đóng">✕</button>
      <h3 id="skill-detail-title" class="finance-modal__title"></h3>

      <label class="skill-detail__label" for="skill-detail-notes">📝 Ghi chú</label>
      <textarea id="skill-detail-notes" class="skill-detail__notes" placeholder="Ghi chú, tiến độ, cảm nhận…"></textarea>

      <label class="skill-detail__label">🖼️ Hình ảnh</label>
      <div class="skill-detail__images" id="skill-detail-images"></div>
      <input type="file" id="skill-detail-image-file" accept="image/*" hidden />
      <button type="button" id="skill-detail-upload-btn" class="btn-text">📷 Thêm ảnh</button>
    </div>
  </div>

  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script src="js/common.js?v=5"></script>
  <script src="js/skills.js?v=3"></script>
</body>
</html>
